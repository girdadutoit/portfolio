<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girda du Toit — Senior Lead Designer</title>
    <meta name="description" content="Girda du Toit — Senior Lead Designer. 7+ years designing digital experiences across healthcare, consulting, BioPharma, and campaign sectors.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23111'/><text x='6' y='23' font-size='18' font-weight='900' fill='white' font-family='sans-serif'>G</text></svg>">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        :root {
            --black: #111111;
            --white: #ffffff;
            --grey: #888888;
            --light: #f5f5f5;
            --border: #e8e8e8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
        }
        .nav-name {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--black);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .nav-links a {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--black);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--grey); }

        /* ── HERO ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 40px 60px;
        }
        .hero-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(3.5rem, 10vw, 9rem);
            line-height: 0.92;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--black);
            margin-bottom: 40px;
        }
        .hero-meta {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }
        .hero-role {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--grey);
        }
        .hero-desc {
            font-size: 13px;
            font-weight: 300;
            line-height: 1.6;
            color: var(--grey);
            max-width: 320px;
            text-align: right;
        }

        /* ── WORK SECTION ── */
        .work-section {
            padding: 0 40px 120px;
        }
        .work-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            padding-top: 16px;
            margin-bottom: 0;
        }
        .work-label {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--grey);
        }
        .work-count {
            font-size: 11px;
            color: var(--grey);
        }

        /* ── PROJECT ROWS ── */
        .project-row {
            display: grid;
            grid-template-columns: 1fr 120px 120px;
            align-items: center;
            padding: 22px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--black);
            transition: background 0.2s;
            cursor: pointer;
        }
        .project-row:hover { background: var(--light); margin: 0 -40px; padding-left: 40px; padding-right: 40px; }
        .project-name {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            transition: opacity 0.2s;
        }
        .project-row:hover .project-name { opacity: 0.6; }
        .project-sector {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--grey);
            text-align: right;
        }
        .project-arrow {
            text-align: right;
            font-size: 18px;
            color: var(--black);
            transition: transform 0.2s;
        }
        .project-row:hover .project-arrow { transform: translateX(4px); }

        /* ── FOOTER ── */
        footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        footer span {
            font-size: 11px;
            color: var(--grey);
            letter-spacing: 0.06em;
        }
        .footer-links {
            display: flex;
            gap: 24px;
        }
        .footer-links a {
            font-size: 11px;
            color: var(--grey);
            text-decoration: none;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--black); }

        /* ── MOBILE ── */
        @media (max-width: 640px) {
            nav { padding: 16px 20px; }
            .hero { padding: 0 20px 48px; }
            .hero-desc { text-align: left; }
            .work-section { padding: 0 20px 80px; }
            .project-row { grid-template-columns: 1fr 80px; }
            .project-sector { display: none; }
            .project-row:hover { margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
            footer { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <a href="index.html" class="nav-name">Girda du Toit</a>
    <div class="nav-links">
        <a href="about.html">About</a>
        <a href="mailto:girdadutoit@gmail.com">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1 class="hero-title">Girda<br>du Toit<br>Senior UX<br>Designer</h1>
    <div class="hero-meta">
        <span class="hero-role">[ Senior Lead Designer ]</span>
        <p class="hero-desc">7+ years designing digital experiences across Healthcare, Consulting, BioPharma, Education and Campaign sectors. Based in London.</p>
    </div>
</section>

<!-- WORK -->
<section class="work-section">
    <div class="work-header">
        <span class="work-label">[ Selected Work ]</span>
        <span class="work-count">5 projects</span>
    </div>
    <div id="project-list"></div>
</section>

<!-- FOOTER -->
<footer>
    <span>Girda du Toit '25</span>
    <div class="footer-links">
        <a href="mailto:girdadutoit@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/girdadutoit" target="_blank">LinkedIn</a>
        <a href="about.html">About</a>
    </div>
</footer>

<script>
    const projects = [
        { name: 'GoodLet',             sector: 'PropTech',     url: 'goodlet-case-study.html' },
        { name: 'Sendero Consulting',  sector: 'Consulting',   url: 'sendero-case-study.html' },
        { name: 'Make it in America',  sector: 'Campaign',     url: 'makeit-case-study.html' },
        { name: 'ADVI Health',         sector: 'Healthcare',   url: 'advi-case-study.html' },
        { name: 'KorroBio',            sector: 'BioPharma',    url: 'korrobio-case-study.html' },
    ];

    document.getElementById('project-list').innerHTML = projects.map(p => `
        <a class="project-row" href="${p.url}">
            <span class="project-name">${p.name}</span>
            <span class="project-sector">${p.sector}</span>
            <span class="project-arrow">→</span>
        </a>
    `).join('');
</script>

</body>
</html>
